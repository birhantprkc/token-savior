<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#162032"/>
      <stop offset="100%" stop-color="#0B1220"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.6" fill="#1E2A3E" opacity="0.5"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Top right version tag -->
  <g transform="translate(1080, 50)">
    <rect x="-50" y="-22" width="100" height="32" rx="4" fill="none" stroke="#00D9FF" stroke-width="1.2" opacity="0.7"/>
    <text x="0" y="0" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="16" fill="#00D9FF" text-anchor="middle" letter-spacing="2">v3.0</text>
  </g>

  <!-- Title -->
  <text x="600" y="140" font-family="Inter, system-ui, sans-serif" font-size="68" font-weight="900" fill="#FFFFFF" text-anchor="middle" letter-spacing="-2">
    TOKEN SAVIOR
  </text>
  <text x="600" y="180" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="500" fill="#7A8898" text-anchor="middle" letter-spacing="3">
    MCP SERVER FOR CLAUDE CODE
  </text>

  <!-- Stat cards (centered, three across) -->
  <!-- Card 1 — Accuracy -->
  <g transform="translate(120, 260)">
    <rect x="0" y="0" width="300" height="180" rx="12" fill="none" stroke="#00E5A0" stroke-width="1.5" opacity="0.4"/>
    <text x="150" y="98" font-family="Inter, system-ui, sans-serif" font-size="84" font-weight="800" fill="#00E5A0" text-anchor="middle" letter-spacing="-3">97.9%</text>
    <text x="150" y="140" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#9AA8B8" text-anchor="middle" letter-spacing="4">ACCURACY</text>
    <text x="150" y="162" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="400" fill="#5A6878" text-anchor="middle">vs 78% plain Claude</text>
  </g>

  <!-- Card 2 — Tokens -->
  <g transform="translate(450, 260)">
    <rect x="0" y="0" width="300" height="180" rx="12" fill="none" stroke="#00D9FF" stroke-width="1.5" opacity="0.5"/>
    <text x="150" y="98" font-family="Inter, system-ui, sans-serif" font-size="84" font-weight="800" fill="#00D9FF" text-anchor="middle" letter-spacing="-3">−80%</text>
    <text x="150" y="140" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#9AA8B8" text-anchor="middle" letter-spacing="4">TOKENS</text>
    <text x="150" y="162" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="400" fill="#5A6878" text-anchor="middle">3 395 / task vs 17 221</text>
  </g>

  <!-- Card 3 — Speed -->
  <g transform="translate(780, 260)">
    <rect x="0" y="0" width="300" height="180" rx="12" fill="none" stroke="#FF7A8E" stroke-width="1.5" opacity="0.5"/>
    <text x="150" y="98" font-family="Inter, system-ui, sans-serif" font-size="84" font-weight="800" fill="#FF7A8E" text-anchor="middle" letter-spacing="-3">6×</text>
    <text x="150" y="140" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#9AA8B8" text-anchor="middle" letter-spacing="4">FASTER</text>
    <text x="150" y="162" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="400" fill="#5A6878" text-anchor="middle">18.9s / task vs 110s</text>
  </g>

  <!-- Bottom info -->
  <text x="600" y="510" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="500" fill="#9AA8B8" text-anchor="middle">
    tsbench · 96 tasks · Claude Opus 4.7 · May 2026
  </text>
  <text x="600" y="555" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="15" font-weight="500" fill="#00D9FF" text-anchor="middle">
    github.com/Mibayy/token-savior
  </text>

  <!-- Subtle accent lines -->
  <line x1="60" y1="320" x2="100" y2="320" stroke="#00E5A0" stroke-width="2" opacity="0.6"/>
  <line x1="1100" y1="320" x2="1140" y2="320" stroke="#FF7A8E" stroke-width="2" opacity="0.6"/>
</svg>
